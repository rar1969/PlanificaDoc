<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PlanificaDoc - Asistente inteligente para planificaciones docentes. Generá planificaciones, desarrollos teóricos, ejercicios, adaptaciones DEA, cuestionarios, rúbricas y más, con IA.">
    <title>PlanificaDoc — Planificaciones Docentes con IA</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- jsPDF para exportar PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

    <!-- Estilos -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Favicon inline -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body>

    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <h1 class="app-logo">PlanificaDoc</h1>
            <p class="app-subtitle">Asistente inteligente para planificaciones docentes</p>
        </header>

        <!-- Step Indicator -->
        <div class="step-indicator" id="step-indicator"></div>

        <!-- Step Container (rendered by JS) -->
        <main id="step-container"></main>
    </div>

    <!-- Settings Button -->
    <button class="settings-btn" id="settings-btn" title="Volver al inicio">🏠</button>

    <!-- Librería docx para exportar Word (.docx) nativo real (se usa recién al exportar) -->
    <script src="https://cdn.jsdelivr.net/npm/docx@9.7.1/dist/index.iife.js" defer></script>

    <!-- Scripts -->
    <script src="js/data.js?v=4"></script>
    <script src="js/generator.js?v=4"></script>
    <script src="js/export.js?v=4"></script>
    <script src="js/app.js?v=4"></script>

</body>
</html>
